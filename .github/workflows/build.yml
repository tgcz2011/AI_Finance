name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: AI-Finance-Simulator-Windows
            ext: .exe
          - os: macos-latest
            artifact: AI-Finance-Simulator-macOS
            ext: ''
          - os: ubuntu-latest
            artifact: AI-Finance-Simulator-Linux
            ext: ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Run tests
        run: pytest tests/unit -q

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --name AI-Finance-Simulator --noconfirm --windowed --onedir `
            --add-data "config;config" `
            --hidden-import sqlalchemy.dialects.sqlite `
            --hidden-import sqlalchemy.ext.asyncio `
            --hidden-import aiosqlite `
            --hidden-import cryptography.fernet `
            --hidden-import pydantic `
            --hidden-import yaml `
            src/main.py

      - name: Build with PyInstaller (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --name AI-Finance-Simulator --noconfirm --windowed --onedir \
            --add-data "config:config" \
            --hidden-import sqlalchemy.dialects.sqlite \
            --hidden-import sqlalchemy.ext.asyncio \
            --hidden-import aiosqlite \
            --hidden-import cryptography.fernet \
            --hidden-import pydantic \
            --hidden-import yaml \
            src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/AI-Finance-Simulator/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release archives
        run: |
          cd artifacts
          mkdir -p ../release
          for dir in */; do
            name="${dir%/}"
            if [ "$RUNNER_OS" = "Windows" ] || echo "$name" | grep -q "Windows"; then
              cd "$dir" && zip -r "../../release/${name}.zip" . && cd ..
            else
              tar -czf "../release/${name}.tar.gz" -C "$dir" .
            fi
          done
          cd ..
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            if echo "$name" | grep -q "Windows"; then
              (cd "$dir" && zip -r "../../release/${name}.zip" .)
            else
              tar -czf "release/${name}.tar.gz" -C "$dir" .
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
